baseURL = "https://gooy.site/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "Gooy"
theme = ["gooy"]
author = "MParvin"

enableRobotsTXT = true
canonifyURLs = true

[pagination]
pagerSize = 10

[permalinks]
  posts = "/posts/:slug/"
  pages = "/:slug/"

[taxonomies]
  category = "categories"
  subcategory = "subcategories"
  tag = "tags"

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    noClasses = false

languageCode = "fa-IR"
defaultContentLanguage = "fa"
